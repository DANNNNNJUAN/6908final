<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F1DF"/>
      <stop offset="0.52" stop-color="#EEF4EA"/>
      <stop offset="1" stop-color="#E7F0F2"/>
    </linearGradient>
    <linearGradient id="local" x1="210" y1="170" x2="1060" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF6"/>
      <stop offset="1" stop-color="#F4F0DF"/>
    </linearGradient>
    <linearGradient id="device" x1="1120" y1="238" x2="1440" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9F4F0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#243126" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#17221B" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12" stroke="#37443B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowDeep" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12" stroke="#23665F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 44px Georgia, "Times New Roman", serif; fill: #18231D; letter-spacing: -0.6px; }
      .subtitle { font: 500 20px "Segoe UI", sans-serif; fill: #5D6D62; }
      .section { font: 800 18px "Segoe UI", sans-serif; fill: #455145; letter-spacing: 1.6px; text-transform: uppercase; }
      .cardTitle { font: 800 24px "Segoe UI", sans-serif; fill: #17221B; }
      .cardText { font: 500 16px "Segoe UI", sans-serif; fill: #59665D; }
      .tag { font: 800 13px "Segoe UI", sans-serif; fill: #6A5638; letter-spacing: 1.2px; }
      .label { font: 700 15px "Segoe UI", sans-serif; fill: #37443B; }
      .tiny { font: 600 13px "Segoe UI", sans-serif; fill: #6A766D; }
      .arrowText { font: 800 14px "Segoe UI", sans-serif; fill: #435047; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="0" fill="url(#bg)"/>
  <circle cx="1420" cy="110" r="170" fill="#D8E6DE" opacity="0.45"/>
  <circle cx="128" cy="782" r="190" fill="#EAD9B8" opacity="0.35"/>
  <path d="M83 174C274 86 451 109 651 143C896 184 1035 78 1251 90C1377 97 1470 139 1525 211" stroke="#DFD6BF" stroke-width="3" stroke-dasharray="8 16" opacity="0.7"/>

  <text x="84" y="88" class="title">InkSight Local Deployment Architecture</text>
  <text x="86" y="123" class="subtitle">Local Next.js + FastAPI generate e-ink-ready content; ESP32 pulls rendered images over LAN.</text>

  <rect x="78" y="154" width="114" height="30" rx="15" fill="#F2DEAE"/>
  <text x="101" y="175" class="tag">LOCAL FIRST</text>
  <rect x="208" y="154" width="122" height="30" rx="15" fill="#CFE4DC"/>
  <text x="229" y="175" class="tag" fill="#285B55">DEEPSEEK AI</text>
  <rect x="346" y="154" width="142" height="30" rx="15" fill="#E4EAD6"/>
  <text x="368" y="175" class="tag">E-INK DISPLAY</text>

  <g filter="url(#shadow)">
    <rect x="76" y="220" width="1010" height="590" rx="38" fill="url(#local)" stroke="#F7F0D8" stroke-width="2"/>
  </g>
  <text x="116" y="272" class="section">Local Machine</text>

  <g filter="url(#shadow)">
    <rect x="1134" y="220" width="390" height="590" rx="38" fill="url(#device)" stroke="#F1F7F3" stroke-width="2"/>
  </g>
  <text x="1174" y="272" class="section">Hardware Device</text>

  <g filter="url(#softShadow)">
    <rect x="132" y="324" width="280" height="150" rx="28" fill="#FFFFFF"/>
    <circle cx="172" cy="366" r="22" fill="#EFD9A4"/>
    <path d="M162 365H182M162 374H176M162 356H182" stroke="#6D5735" stroke-width="4" stroke-linecap="round"/>
    <text x="206" y="360" class="cardTitle">Frontend</text>
    <text x="206" y="389" class="cardText">Next.js WebApp</text>
    <text x="154" y="430" class="cardText">Configuration, mode selection,</text>
    <text x="154" y="454" class="cardText">local preview workflow</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="478" y="324" width="280" height="150" rx="28" fill="#FFFFFF"/>
    <circle cx="518" cy="366" r="22" fill="#CFE4DC"/>
    <path d="M508 370C512 360 524 360 528 370M508 363H528M508 377H528" stroke="#285B55" stroke-width="4" stroke-linecap="round"/>
    <text x="552" y="360" class="cardTitle">Backend</text>
    <text x="552" y="389" class="cardText">FastAPI service</text>
    <text x="500" y="430" class="cardText">Device APIs, config storage,</text>
    <text x="500" y="454" class="cardText">AI orchestration, rendering</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="824" y="324" width="210" height="150" rx="28" fill="#FFFFFF"/>
    <circle cx="864" cy="366" r="22" fill="#E6EBD9"/>
    <path d="M854 360H874M854 368H874M854 376H868" stroke="#59623F" stroke-width="4" stroke-linecap="round"/>
    <text x="898" y="360" class="cardTitle">SQLite</text>
    <text x="898" y="389" class="cardText">Local data</text>
    <text x="846" y="430" class="cardText">Config, cache,</text>
    <text x="846" y="454" class="cardText">history, state</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="132" y="578" width="260" height="144" rx="28" fill="#FFFFFF"/>
    <circle cx="172" cy="620" r="22" fill="#EFE6C8"/>
    <path d="M163 613L172 604L181 613M163 627L172 636L181 627M172 606V634" stroke="#6D5735" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="206" y="615" class="cardTitle">Mode System</text>
    <text x="206" y="644" class="cardText">JSON-driven</text>
    <text x="154" y="684" class="cardText">Built-in and custom</text>
    <text x="154" y="708" class="cardText">display modes</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="478" y="578" width="280" height="144" rx="28" fill="#FFFFFF"/>
    <circle cx="518" cy="620" r="22" fill="#D4E2F0"/>
    <path d="M507 625L514 617L522 623L529 612M508 634H528" stroke="#355B76" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="552" y="615" class="cardTitle">Renderer</text>
    <text x="552" y="644" class="cardText">E-ink bitmap output</text>
    <text x="500" y="684" class="cardText">Layout, fonts, palette,</text>
    <text x="500" y="708" class="cardText">PNG preview and BMP device image</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="824" y="578" width="210" height="144" rx="28" fill="#F8FFFC"/>
    <circle cx="864" cy="620" r="22" fill="#BFE3DA"/>
    <path d="M854 620C858 609 870 609 874 620C870 631 858 631 854 620Z" stroke="#23665F" stroke-width="3.8"/>
    <circle cx="864" cy="620" r="4" fill="#23665F"/>
    <text x="898" y="615" class="cardTitle">DeepSeek</text>
    <text x="898" y="644" class="cardText">AI content</text>
    <text x="846" y="684" class="cardText">OpenAI-compatible</text>
    <text x="846" y="708" class="cardText">API integration</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1190" y="334" width="278" height="152" rx="30" fill="#FFFFFF"/>
    <circle cx="1232" cy="378" r="24" fill="#D6E7F0"/>
    <path d="M1223 382H1241M1226 371H1238M1227 392H1237" stroke="#31576F" stroke-width="4" stroke-linecap="round"/>
    <text x="1270" y="372" class="cardTitle">ESP32-C3</text>
    <text x="1270" y="401" class="cardText">Custom firmware</text>
    <text x="1215" y="444" class="cardText">Wi-Fi, HTTP fetch,</text>
    <text x="1215" y="468" class="cardText">sleep and refresh control</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1190" y="586" width="278" height="152" rx="30" fill="#FFFDF8"/>
    <rect x="1222" y="623" width="74" height="88" rx="10" fill="#F6F0DA" stroke="#B7AA84" stroke-width="3"/>
    <path d="M1236 646H1282M1236 666H1272M1236 686H1285" stroke="#786D50" stroke-width="4" stroke-linecap="round"/>
    <text x="1320" y="630" class="cardTitle">E-ink</text>
    <text x="1320" y="659" class="cardText">4.2-inch display</text>
    <text x="1320" y="699" class="cardText">Low-power</text>
    <text x="1320" y="723" class="cardText">paper-like output</text>
  </g>

  <path d="M412 399H474" stroke="#37443B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="416" y="382" class="arrowText">REST</text>

  <path d="M758 399H820" stroke="#37443B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="762" y="382" class="arrowText">store</text>

  <path d="M618 474V573" stroke="#37443B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="632" y="529" class="arrowText">render</text>

  <path d="M392 650H474" stroke="#37443B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="406" y="634" class="arrowText">layout</text>

  <path d="M824 650H762" stroke="#23665F" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowDeep)"/>
  <text x="776" y="634" class="arrowText" fill="#23665F">AI text</text>

  <path d="M132 505C132 536 208 540 478 540C610 540 676 546 676 574" stroke="#637067" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="8 10"/>
  <text x="246" y="529" class="tiny">preview request</text>

  <path d="M758 650C1036 650 1010 410 1186 410" stroke="#37443B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="931" y="602" class="arrowText">BMP over LAN</text>

  <path d="M1328 486V582" stroke="#37443B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="1345" y="542" class="arrowText">refresh</text>

  <path d="M478 605C320 548 303 507 412 444" stroke="#8A7651" stroke-width="3.5" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="8 10"/>
  <text x="280" y="565" class="tiny">PNG preview returns to UI</text>

  <rect x="115" y="760" width="920" height="1.5" fill="#DED2B7"/>
  <text x="116" y="792" class="label">Key design decision:</text>
  <text x="266" y="792" class="tiny">Keep ESP32 firmware lightweight. Put model calls, caching, mode composition, and e-ink rendering in the local backend.</text>
</svg>
